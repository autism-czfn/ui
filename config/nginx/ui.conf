# =============================================================================
# UI reverse proxy + anti-abuse hardening
# =============================================================================
# Template — the public-IP placeholder on the two `server_name` lines below
# is substituted at install time by `setup.sh` (option: Install nginx config).
#
# This file is included inside the http{} context, so http-level directives
# (limit_req_zone, limit_conn_zone, map) are valid at the top.

# --- Per-IP request-rate zones --------------------------------------------
# $binary_remote_addr = 4 bytes IPv4 / 16 bytes IPv6; 10m zone ≈ 160k IPs.
limit_req_zone  $binary_remote_addr  zone=perip_general:10m  rate=5r/s;
limit_req_zone  $binary_remote_addr  zone=perip_api:10m      rate=3r/s;
limit_req_zone  $binary_remote_addr  zone=perip_collect:10m  rate=1r/s;

# --- Per-IP concurrent-connection zone ------------------------------------
limit_conn_zone $binary_remote_addr  zone=perip_conn:10m;

# Return 429 (Too Many Requests) instead of the default 503 when throttling.
limit_req_status  429;
limit_conn_status 429;

# --- Reject known scanner/attack User-Agents ------------------------------
map $http_user_agent $bad_bot {
    default                                                              0;
    ""                                                                   1;  # empty UA
    ~*(nikto|sqlmap|nessus|acunetix|wpscan|dirbuster|gobuster|nmap|masscan|zgrab)  1;
}

# --- Reject obvious attack-path probes ------------------------------------
map $request_uri $bad_uri {
    default                                                     0;
    ~*\.(env|git|svn|htaccess|htpasswd|bak|old|sql|ini|yml)$    1;
    ~*/(wp-admin|wp-login|phpmyadmin|xmlrpc|\.git/|\.env)        1;
}

upstream ui_backend      { server 127.0.0.1:18000; }
upstream search_backend  { server 127.0.0.1:3001;  }
upstream collect_backend { server 127.0.0.1:18001; }
upstream django_admin    { server 127.0.0.1:8001;  }   # Django runserver, plain HTTP

# =============================================================================
# 443 : TLS, UI, API proxy, collect proxy
# =============================================================================
server {
    listen 443 ssl http2;
    server_name __PUBLIC_IP__;

    # --- TLS ---------------------------------------------------------------
    ssl_certificate     /home/test/data/code/certs/cert.pem;
    ssl_certificate_key /home/test/data/code/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # --- Hide nginx version -----------------------------------------------
    server_tokens off;

    # --- Slow-loris / slow-POST mitigation --------------------------------
    client_header_timeout 10s;
    client_body_timeout   120s;   # allow 50MB audio upload on slow links
    send_timeout          30s;
    keepalive_timeout     65s;
    keepalive_requests    100;

    # --- Request/header buffer limits -------------------------------------
    client_header_buffer_size    1k;
    large_client_header_buffers  4 8k;
    client_body_buffer_size      16k;
    client_max_body_size         50m;

    # --- Concurrent connections per IP ------------------------------------
    limit_conn perip_conn 5;

    # --- Drop scanner / bad-UA / bad-path traffic -------------------------
    if ($bad_bot) { return 444; }
    if ($bad_uri) { return 444; }

    # --- Allowed HTTP methods only ----------------------------------------
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) { return 405; }

    # --- Security response headers ----------------------------------------
    add_header Strict-Transport-Security "max-age=31536000"        always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header Referrer-Policy           "no-referrer"             always;
    add_header Permissions-Policy        "microphone=(self)"       always;

    # --- /api/*  →  search backend (SSE-safe) -----------------------------
    location /api/ {
        limit_req zone=perip_api burst=10 nodelay;

        proxy_pass              https://search_backend;
        proxy_ssl_verify        off;
        proxy_ssl_server_name   on;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # /api/search/stream is Server-Sent Events — no buffering.
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
    }

    # --- /collect/*  →  collect backend (strip prefix) --------------------
    location /collect/ {
        limit_req zone=perip_collect burst=3 nodelay;

        proxy_pass              https://collect_backend/;
        proxy_ssl_verify        off;
        proxy_ssl_server_name   on;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      300s;
        proxy_request_buffering off;
    }

    # --- /admin/  →  Django admin (crawler) -------------------------------
    location /admin/ {
        limit_req zone=perip_general burst=15 nodelay;

        proxy_pass              http://django_admin;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Forwarded-Host  $host;

        # Rewrite Django's http://127.0.0.1:8001/... Location headers to https
        proxy_redirect          http://127.0.0.1:8001/ https://$host/;
    }

    # --- /static/  →  Django (admin CSS/JS/images, served by runserver) ---
    location /static/ {
        limit_req zone=perip_general burst=15 nodelay;

        proxy_pass              http://django_admin;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    # --- /  →  UI (serve.py on 18000) -------------------------------------
    location / {
        limit_req zone=perip_general burst=15 nodelay;

        proxy_pass              https://ui_backend;
        proxy_ssl_verify        off;
        proxy_ssl_server_name   on;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# 80 : plain-HTTP → HTTPS redirect (for this IP only)
# =============================================================================
server {
    listen 80;
    server_name __PUBLIC_IP__;
    server_tokens off;
    return 301 https://$host$request_uri;
}
